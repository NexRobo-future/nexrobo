<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NexRobo Bluetooth Controller</title>
  <style>
    :root{
      --bg:#0b1020;
      --card:#121a33;
      --text:#eef2ff;
      --muted:#aab4d6;
      --border:rgba(255,255,255,.12);
      --accent:#6ea8ff;
      --accent2:#7cffc4;
      --danger:#ff7d7d;
      --good:#58d9a1;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top,#182447 0%,var(--bg) 60%);
      color:var(--text);
    }

    .wrap{max-width:980px;margin:0 auto;padding:16px}
    .hero{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      flex-wrap:wrap;
    }
    h1{margin:0;font-size:1.45rem}
    .pill{
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--muted);
      min-width:120px;
      text-align:center;
      font-size:.92rem;
      font-weight:700;
    }
    .pill.connected{
      background:linear-gradient(180deg,#8cf7c5,#32c887);
      color:#072012;
    }
    .pill.disconnected{
      background:linear-gradient(180deg,#ffb0b0,#ff7d7d);
      color:#2a1010;
    }

    .row{
      display:grid;
      gap:10px;
      grid-template-columns:1fr 1fr;
      margin-bottom:12px;
    }
    @media (max-width: 640px){ .row{grid-template-columns:1fr} }

    .card{
      background:rgba(18,26,51,.92);
      border:1px solid var(--border);
      border-radius:18px;
      padding:14px;
    }

    label{
      display:block;
      font-size:.92rem;
      color:var(--muted);
      margin-bottom:6px;
    }

    input,button{
      width:100%;
      border:0;
      outline:none;
      border-radius:14px;
      padding:14px 14px;
      font-size:1rem;
    }

    input{
      background:#0a1126;
      color:var(--text);
      border:1px solid var(--border);
    }

    button{
      background:linear-gradient(180deg,#74a7ff,#4d7dff);
      color:white;
      font-weight:700;
      cursor:pointer;
      transition:transform .12s ease, filter .12s ease, background .12s ease;
      box-shadow:0 8px 20px rgba(77,125,255,.22);
    }

    button:active{transform:scale(.98)}
    button:disabled{opacity:.5;cursor:not-allowed}

    button.secondary{
      background:linear-gradient(180deg,#2b355b,#1a2242);
      box-shadow:none;
      border:1px solid var(--border);
    }

    button.good{background:linear-gradient(180deg,#58d9a1,#2aa66f)}
    button.warn{background:linear-gradient(180deg,#ff9a7d,#ff6c6c)}

    button.active{
      box-shadow:0 0 0 2px rgba(255,255,255,.18) inset, 0 10px 20px rgba(0,0,0,.18);
      filter:brightness(1.08);
      border:1px solid rgba(255,255,255,.18);
    }

    button.active.mode-auto{
      background:linear-gradient(180deg,#7cffc4,#2fbf7e);
      color:#062013;
    }

    button.active.mode-manual{
      background:linear-gradient(180deg,#ffd36e,#ffb93d);
      color:#231700;
    }

    button.active.expr{
      background:linear-gradient(180deg,#ffbf6e,#ff8f3d);
      color:#231700;
    }

    button.active.text{
      background:linear-gradient(180deg,#8fe0ff,#5cb5ff);
      color:#062033;
    }

    .grid{
      display:grid;
      gap:10px;
      grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
      margin-top:12px;
    }

    .group-title{
      margin:16px 0 8px;
      font-size:1rem;
      color:var(--accent2);
      font-weight:700;
    }

    /* Game overlay screens */
    .overlay{
      position:fixed;
      inset:0;
      background:rgba(5,8,18,.92);
      backdrop-filter:blur(10px);
      display:none;
      z-index:50;
      padding:14px;
    }
    .overlay.show{display:block}

    .screen{
      max-width:920px;
      margin:0 auto;
      height:100%;
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .screen-top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .screen-title{
      font-size:1.35rem;
      font-weight:800;
      margin:0;
    }

    .screen-sub{
      color:var(--muted);
      margin:0;
      font-size:.92rem;
    }

    .top-actions{
      display:flex;
      gap:10px;
      width:auto;
      min-width:240px;
    }
    .top-actions button{flex:1}

    .center-box{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .big-stack{
      display:flex;
      flex-direction:column;
      gap:14px;
      align-items:center;
      justify-content:center;
      width:100%;
      max-width:340px;
    }

    .big-arrow{
      width:160px;
      height:160px;
      border-radius:26px;
      background:#f4f4f4;
      color:#111;
      border:6px solid #111;
      box-shadow:none;
      font-size:4.5rem;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    .big-arrow:active{
      transform:scale(.98);
      filter:brightness(.95);
    }

    .game-menu{
      display:grid;
      gap:12px;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      width:100%;
      margin-top:6px;
    }

    .game-card{
      min-height:120px;
      padding:18px 14px;
      font-size:1.05rem;
      border-radius:20px;
      background:linear-gradient(180deg,#24315e,#1a2242);
      border:1px solid var(--border);
      box-shadow:0 10px 20px rgba(0,0,0,.15);
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
      gap:8px;
      text-align:left;
    }
    .game-card .mini{
      font-size:.88rem;
      color:var(--muted);
      font-weight:500;
    }
    .game-card.active{
      background:linear-gradient(180deg,#ffbf6e,#ff8f3d);
      color:#231700;
    }
    .game-card.active .mini{color:#3b2400}

    .hidden{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>NexRobo Bluetooth Controller</h1>
      <div id="connBadge" class="pill disconnected">Disconnected</div>
    </div>

    <div class="row">
      <div class="card">
        <label for="password">Password</label>
        <input id="password" type="text" value="nexrobo" autocomplete="off" />
      </div>
      <div class="card">
        <label>Bluetooth</label>
        <button id="connectBtn">Connect</button>
        <div style="height:10px"></div>
        <button id="disconnectBtn" class="secondary" disabled>Disconnect</button>
      </div>
    </div>

    <div class="card">
      <div class="group-title">Mode</div>
      <div class="grid">
        <button id="autoBtn" class="good" disabled>AUTO</button>
        <button id="manualBtn" class="secondary" disabled>MANUAL</button>
      </div>

      <div class="group-title">Expressions</div>
      <div id="expressionGrid" class="grid"></div>

      <div class="group-title">Games</div>
      <button id="openGameBtn" class="secondary" disabled>Games</button>

      <div class="group-title">Custom Text</div>
      <label for="customText">Text</label>
      <input id="customText" type="text" maxlength="7" placeholder="Up to 7 chars" disabled />
      <div style="height:10px"></div>
      <button id="sendTextBtn" class="warn" disabled>Show Text</button>
    </div>
  </div>

  <div id="gameOverlay" class="overlay">
    <div class="screen">
      <div class="screen-top">
        <div>
          <p class="screen-title">You vs NexRobo</p>
          <p id="gameHint" class="screen-sub">Choose a game</p>
        </div>
        <div class="top-actions">
          <button id="gameBackBtn" class="secondary">Back</button>
          <button id="gameCloseBtn" class="warn">Close</button>
        </div>
      </div>

      <div id="introScreen" class="card">
        <div class="center-box">
          <div class="big-stack" style="max-width:420px;">
            <button id="playBtn" class="good">Play</button>
          </div>
        </div>
      </div>

      <div id="selectScreen" class="card hidden">
        <div class="game-menu">
          <button id="snakePick" class="game-card">
            <div>Snake</div>
            <div class="mini">Battle on OLED</div>
          </button>
          <button id="spacePick" class="game-card">
            <div>Space Shooter</div>
            <div class="mini">Shoot and survive</div>
          </button>
          <button id="flappyPick" class="game-card">
            <div>Flappy Bird</div>
            <div class="mini">Tap to jump</div>
          </button>
        </div>
      </div>

      <div id="controllerScreen" class="card hidden">
        <div class="center-box">
          <div class="big-stack">
            <button id="ctrlTopBtn" class="big-arrow">▲</button>
            <button id="ctrlBottomBtn" class="big-arrow">▼</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
    const PASS_UUID    = 'abcd1234-1a2b-3c4d-5e6f-1234567890ab';
    const CMD_UUID     = 'dcba4321-4b3c-2d1e-f0e9-0987654321ff';
    const TEXT_UUID    = 'effe1234-4b3c-2d1e-f0e9-0987654321aa';

    const EXPRESSIONS = [
      ['SAD', 'Sadness'],
      ['ANGER', 'Anger'],
      ['HAPPY', 'Happiness'],
      ['PLEADING', 'Pleading'],
      ['VULNERABLE', 'Vulnerable'],
      ['DESPAIR', 'Despair'],
      ['SURPRISE', 'Surprise'],
      ['DISGUST', 'Disgust'],
      ['FEAR', 'Fear'],
      ['GUILTY', 'Guilty'],
      ['DISAPPOINTED', 'Disappointed'],
      ['EMBARRASSED', 'Embarrassed'],
      ['HORRIFIED', 'Horrified'],
      ['SKEPTICAL', 'Skeptical'],
      ['ANNOYED', 'Annoyed'],
      ['CONFUSED', 'Confused'],
      ['AMAZED', 'Amazed'],
      ['EXCITED', 'Excited'],
      ['FURIOUS', 'Furious'],
      ['SUSPICIOUS', 'Suspicious'],
      ['REJECTED', 'Rejected'],
      ['BORED', 'Bored'],
      ['TIRED', 'Tired'],
      ['ASLEEP', 'Asleep']
    ];

    const GAME_MAP = {
      snake: { ble: 'GAME_SNAKE', title: 'Snake', top: '▲', bottom: '▼', topCmd: 'UP', bottomCmd: 'DOWN' },
      space: { ble: 'GAME_SPACE', title: 'Space Shooter', top: '◀', bottom: '▶', topCmd: 'LEFT', bottomCmd: 'RIGHT' },
      flappy:{ ble: 'GAME_FLAPPY', title: 'Flappy Bird', top: '▲', bottom: '⟲', topCmd: 'JUMP', bottomCmd: 'EXIT' }
    };

    let device = null;
    let server = null;
    let service = null;
    let passChar = null;
    let cmdChar = null;
    let textChar = null;

    let activeMode = 'auto';
    let activeExpression = '';
    let textShown = false;

    let overlayOpen = false;
    let screenState = 'intro'; // intro | select | controller
    let selectedGameKey = '';

    const $ = (id) => document.getElementById(id);
    const expressionButtons = new Map();

    function setConnectionState(connected) {
      const badge = $('connBadge');
      badge.textContent = connected ? 'Connected' : 'Disconnected';
      badge.classList.toggle('connected', connected);
      badge.classList.toggle('disconnected', !connected);
    }

    function setButtons(enabled) {
      $('disconnectBtn').disabled = !enabled;
      $('autoBtn').disabled = !enabled;
      $('manualBtn').disabled = !enabled;
      $('sendTextBtn').disabled = !enabled;
      $('password').disabled = !enabled;
      $('customText').disabled = !enabled;
      $('openGameBtn').disabled = !enabled;
      document.querySelectorAll('#expressionGrid button').forEach(btn => btn.disabled = !enabled);
      document.querySelectorAll('#gameOverlay button').forEach(btn => {
        if (btn.id !== 'gameBackBtn' && btn.id !== 'gameCloseBtn') btn.disabled = !enabled;
      });
    }

    function updateTextButton() {
      const btn = $('sendTextBtn');
      btn.textContent = textShown ? 'Remove Text' : 'Show Text';
      btn.classList.toggle('active', textShown);
      btn.classList.toggle('text', textShown);
    }

    function renderMainState() {
      $('autoBtn').classList.toggle('active', activeMode === 'auto');
      $('autoBtn').classList.toggle('mode-auto', activeMode === 'auto');

      $('manualBtn').classList.toggle('active', activeMode === 'manual');
      $('manualBtn').classList.toggle('mode-manual', activeMode === 'manual');

      for (const [cmd, btn] of expressionButtons.entries()) {
        const on = activeExpression === cmd;
        btn.classList.toggle('active', on);
        btn.classList.toggle('expr', on);
      }

      updateTextButton();
    }

    function openGameOverlay() {
      overlayOpen = true;
      screenState = 'intro';
      selectedGameKey = '';
      $('gameOverlay').classList.add('show');
      renderGameScreen();
    }

    function closeGameOverlay(sendExit = true) {
      overlayOpen = false;
      screenState = 'intro';
      selectedGameKey = '';
      $('gameOverlay').classList.remove('show');
      if (sendExit) sendRawCommand('EXIT');
    }

    function renderGameScreen() {
      $('introScreen').classList.toggle('hidden', screenState !== 'intro');
      $('selectScreen').classList.toggle('hidden', screenState !== 'select');
      $('controllerScreen').classList.toggle('hidden', screenState !== 'controller');

      $('gameHint').textContent =
        screenState === 'intro' ? 'Press play to continue' :
        screenState === 'select' ? 'Choose one of the 3 games' :
        selectedGameKey ? `Playing: ${GAME_MAP[selectedGameKey].title}` : 'Choose a game';

      $('gameBackBtn').textContent =
        screenState === 'intro' ? 'Back' :
        screenState === 'select' ? 'Back' : 'Back';

      if (screenState === 'controller' && selectedGameKey) {
        const g = GAME_MAP[selectedGameKey];
        $('ctrlTopBtn').textContent = g.top;
        $('ctrlBottomBtn').textContent = g.bottom;
      }

      document.querySelectorAll('#selectScreen .game-card').forEach(btn => btn.classList.remove('active'));
      if (selectedGameKey) {
        const pick = {
          snake: $('snakePick'),
          space: $('spacePick'),
          flappy: $('flappyPick')
        }[selectedGameKey];
        if (pick) pick.classList.add('active');
      }
    }

    function clearGameSelection() {
      selectedGameKey = '';
      screenState = 'select';
      renderGameScreen();
    }

    async function writeText(characteristic, text) {
      const data = new TextEncoder().encode(text);
      try {
        if (characteristic.writeValueWithoutResponse) {
          await characteristic.writeValueWithoutResponse(data);
          return;
        }
      } catch (e) {}
      await characteristic.writeValue(data);
    }

    async function sendRawCommand(cmd) {
      if (!cmdChar) return;
      await writeText(cmdChar, cmd);
    }

    async function clearTextIfShown() {
      if (!textShown || !textChar) return;
      await writeText(textChar, 'CLEAR');
      textShown = false;
      updateTextButton();
    }

    async function sendFaceCommand(cmd) {
      await clearTextIfShown();
      if (overlayOpen) closeGameOverlay(false);
      await sendRawCommand(cmd);

      if (cmd === 'AUTO') {
        activeMode = 'auto';
        activeExpression = '';
      } else if (cmd === 'MANUAL') {
        activeMode = 'manual';
        activeExpression = '';
      } else {
        activeMode = 'manual';
        activeExpression = cmd;
      }

      renderMainState();
    }

    async function startGame(gameKey) {
      const g = GAME_MAP[gameKey];
      if (!g) return;

      await clearTextIfShown();
      await sendRawCommand(g.ble);

      selectedGameKey = gameKey;
      screenState = 'controller';
      renderGameScreen();
    }

    async function controllerAction(which) {
      if (!selectedGameKey) return;
      const g = GAME_MAP[selectedGameKey];
      if (!g) return;

      await clearTextIfShown();

      if (which === 'top') {
        if (selectedGameKey === 'flappy') {
          await sendRawCommand('JUMP');
        } else {
          await sendRawCommand(g.topCmd);
        }
      } else if (which === 'bottom') {
        if (selectedGameKey === 'flappy') {
          await sendRawCommand('EXIT');
          closeGameOverlay(false);
          clearGameSelection();
          return;
        } else {
          await sendRawCommand(g.bottomCmd);
        }
      }
    }

    async function toggleCustomText() {
      if (!textChar) return;

      if (textShown) {
        await writeText(textChar, 'CLEAR');
        textShown = false;
        updateTextButton();
        return;
      }

      const value = $('customText').value.trim();
      if (value.length < 1 || value.length > 7) return;

      await clearGameSelection();
      await writeText(textChar, value);
      textShown = true;
      activeMode = 'manual';
      activeExpression = '';
      renderMainState();
    }

    async function connect() {
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });

        device.addEventListener('gattserverdisconnected', onDisconnected);

        server = await device.gatt.connect();
        service = await server.getPrimaryService(SERVICE_UUID);
        passChar = await service.getCharacteristic(PASS_UUID);
        cmdChar = await service.getCharacteristic(CMD_UUID);
        textChar = await service.getCharacteristic(TEXT_UUID);

        const pass = $('password').value.trim() || 'nexrobo';
        await writeText(passChar, pass);

        setButtons(true);
        setConnectionState(true);

        activeMode = 'auto';
        activeExpression = '';
        textShown = false;
        overlayOpen = false;
        selectedGameKey = '';
        renderMainState();
        renderGameScreen();

        await sendRawCommand('AUTO');
      } catch (err) {
        console.error(err);
        setButtons(false);
        setConnectionState(false);
      }
    }

    function onDisconnected() {
      setButtons(false);
      setConnectionState(false);
      activeMode = 'auto';
      activeExpression = '';
      textShown = false;
      selectedGameKey = '';
      overlayOpen = false;
      $('gameOverlay').classList.remove('show');
      renderMainState();
      renderGameScreen();
    }

    function disconnect() {
      if (device && device.gatt.connected) device.gatt.disconnect();
    }

    $('connectBtn').addEventListener('click', connect);
    $('disconnectBtn').addEventListener('click', disconnect);

    $('autoBtn').addEventListener('click', () => sendFaceCommand('AUTO'));
    $('manualBtn').addEventListener('click', () => sendFaceCommand('MANUAL'));
    $('sendTextBtn').addEventListener('click', toggleCustomText);

    $('openGameBtn').addEventListener('click', openGameOverlay);

    $('gameBackBtn').addEventListener('click', async () => {
      if (!overlayOpen) return;

      if (screenState === 'controller') {
        await sendRawCommand('EXIT');
        selectedGameKey = '';
        screenState = 'select';
        renderGameScreen();
        return;
      }

      if (screenState === 'select') {
        screenState = 'intro';
        renderGameScreen();
        return;
      }

      closeGameOverlay(false);
    });

    $('gameCloseBtn').addEventListener('click', () => closeGameOverlay(true));
    $('playBtn').addEventListener('click', () => {
      screenState = 'select';
      renderGameScreen();
    });

    $('snakePick').addEventListener('click', () => startGame('snake'));
    $('spacePick').addEventListener('click', () => startGame('space'));
    $('flappyPick').addEventListener('click', () => startGame('flappy'));

    $('ctrlTopBtn').addEventListener('click', () => controllerAction('top'));
    $('ctrlBottomBtn').addEventListener('click', () => controllerAction('bottom'));

    $('customText').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') toggl
