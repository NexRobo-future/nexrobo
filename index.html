<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NexRobo Bluetooth Controller</title>
  <style>
    :root {
      --bg: #0b1020;
      --card: #121a33;
      --text: #eef2ff;
      --muted: #aab4d6;
      --accent2: #7cffc4;
      --border: rgba(255,255,255,.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #182447 0%, var(--bg) 60%);
      color: var(--text);
    }

    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 16px;
    }

    .hero {
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.25);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: 1.5rem; }

    .pill {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      font-size: .92rem;
      min-width: 120px;
      text-align: center;
    }

    .pill.connected {
      color: #071b12;
      background: linear-gradient(180deg, #8cf7c5, #32c887);
      border-color: rgba(255,255,255,.15);
      font-weight: 700;
    }

    .pill.disconnected {
      color: #2c1010;
      background: linear-gradient(180deg, #ffb0b0, #ff7d7d);
      border-color: rgba(255,255,255,.15);
      font-weight: 700;
    }

    .row {
      display: grid;
      gap: 10px;
      grid-template-columns: 1fr 1fr;
      margin: 12px 0;
    }

    @media (max-width: 640px) {
      .row { grid-template-columns: 1fr; }
    }

    .card {
      background: rgba(18,26,51,.92);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
    }

    label {
      display: block;
      font-size: .92rem;
      color: var(--muted);
      margin-bottom: 6px;
    }

    input, button {
      width: 100%;
      border: 0;
      outline: none;
      border-radius: 14px;
      padding: 14px 14px;
      font-size: 1rem;
    }

    input {
      background: #0a1126;
      color: var(--text);
      border: 1px solid var(--border);
    }

    button {
      background: linear-gradient(180deg, #74a7ff, #4d7dff);
      color: white;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(77,125,255,.25);
      transition: transform .12s ease, filter .12s ease, background .12s ease;
    }

    button:active { transform: scale(.98); }

    button.secondary {
      background: linear-gradient(180deg, #2b355b, #1a2242);
      box-shadow: none;
      border: 1px solid var(--border);
    }

    button.good { background: linear-gradient(180deg, #58d9a1, #2aa66f); }
    button.warn { background: linear-gradient(180deg, #ff9a7d, #ff6c6c); }

    button.active {
      box-shadow: 0 0 0 2px rgba(255,255,255,.18) inset, 0 10px 20px rgba(0,0,0,.18);
      filter: brightness(1.08);
      border: 1px solid rgba(255,255,255,.18);
    }

    button.active.mode-auto {
      background: linear-gradient(180deg, #7cffc4, #2fbf7e);
      color: #062013;
    }

    button.active.mode-manual {
      background: linear-gradient(180deg, #ffd36e, #ffb93d);
      color: #231700;
    }

    button.active.expr {
      background: linear-gradient(180deg, #ffbf6e, #ff8f3d);
      color: #231700;
    }

    button.active.text {
      background: linear-gradient(180deg, #8fe0ff, #5cb5ff);
      color: #062033;
    }

    button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .grid {
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      margin-top: 12px;
    }

    .group-title {
      margin: 16px 0 8px;
      font-size: 1rem;
      color: var(--accent2);
      font-weight: 700;
    }

    /* ─── Game Mode Button ─── */
    button.game-mode-btn {
      background: linear-gradient(135deg, #a855f7, #6d28d9);
      box-shadow: 0 8px 24px rgba(109,40,217,.35);
      font-size: 1.05rem;
      letter-spacing: .02em;
    }
    button.game-mode-btn:hover { filter: brightness(1.12); }

    /* ─── Game Panel (fullscreen overlay) ─── */
    #gamePanel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: radial-gradient(ellipse at 50% 0%, #1e0a3c 0%, #080c1a 70%);
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 0;
      overflow: hidden;
    }

    #gamePanel.open { display: flex; }

    /* scanline texture */
    #gamePanel::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,.018) 2px,
        rgba(255,255,255,.018) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    .gp-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 520px;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 100dvh;
    }

    .gp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .gp-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: .04em;
      background: linear-gradient(90deg, #c084fc, #818cf8, #67e8f9);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #closePanelBtn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,.15);
      background: rgba(255,255,255,.08);
      font-size: 1.3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: white;
      padding: 0;
      box-shadow: none;
      transition: background .15s;
      flex-shrink: 0;
    }

    #closePanelBtn:hover { background: rgba(255,255,255,.16); }

    /* ─── Game Selection Screen ─── */
    #gameSelectScreen {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .game-pick-label {
      font-size: .88rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: 4px;
    }

    .game-card {
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      border-radius: 20px;
      padding: 22px 20px;
      cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      width: 100%;
      text-align: left;
      color: white;
      font-size: 1rem;
    }

    .game-card:hover {
      background: rgba(255,255,255,.09);
      border-color: rgba(255,255,255,.22);
      transform: translateY(-2px);
    }

    .game-card:active { transform: scale(.98); }

    .game-card .gc-icon {
      font-size: 2.4rem;
      flex-shrink: 0;
      line-height: 1;
    }

    .game-card .gc-info { flex: 1; }

    .game-card .gc-name {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .game-card .gc-desc {
      font-size: .84rem;
      color: #94a3b8;
    }

    .game-card .gc-arrow {
      font-size: 1.2rem;
      color: #64748b;
    }

    /* ─── Game Controller Screen ─── */
    #gameControlScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      flex: 1;
    }

    .gc-active-name {
      font-size: 1rem;
      font-weight: 600;
      color: #c084fc;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .ctrl-hint {
      font-size: .82rem;
      color: #4a5568;
      text-align: center;
    }

    .big-btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      flex: 1;
      max-height: 280px;
    }

    .big-btn {
      border-radius: 24px;
      border: 2px solid rgba(255,255,255,.12);
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: transform .08s, filter .08s;
      touch-action: manipulation;
      height: 100%;
      min-height: 140px;
    }

    .big-btn span.label {
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    #btnLeft {
      background: linear-gradient(160deg, #1e3a8a, #1e40af);
      box-shadow: 0 12px 40px rgba(30,64,175,.35);
    }

    #btnRight {
      background: linear-gradient(160deg, #7e22ce, #9333ea);
      box-shadow: 0 12px 40px rgba(147,51,234,.35);
    }

    .big-btn:active { transform: scale(.94); filter: brightness(1.15); }

    .back-from-ctrl {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.10);
      color: #94a3b8;
      font-size: .9rem;
      border-radius: 14px;
      padding: 12px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      box-shadow: none;
    }

    .back-from-ctrl:hover { background: rgba(255,255,255,.09); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <h1>NexRobo Bluetooth Controller</h1>
      <div id="connBadge" class="pill disconnected">Disconnected</div>
    </div>

    <div class="row">
      <div class="card">
        <label for="password">Password</label>
        <input id="password" type="text" value="nexrobo" autocomplete="off" />
      </div>
      <div class="card">
        <label>Bluetooth</label>
        <button id="connectBtn">Connect</button>
        <div style="height:10px"></div>
        <button id="disconnectBtn" class="secondary" disabled>Disconnect</button>
      </div>
    </div>

    <div class="card">
      <div class="group-title">Mode</div>
      <div class="grid">
        <button id="autoBtn" class="good" disabled>AUTO</button>
        <button id="manualBtn" class="secondary" disabled>MANUAL</button>
        <button id="gameModeBtn" class="game-mode-btn" disabled>🎮 Game Mode</button>
      </div>

      <div class="group-title">Expressions</div>
      <div id="expressionGrid" class="grid"></div>

      <div class="group-title">Custom Text</div>
      <label for="customText">Text</label>
      <input id="customText" type="text" maxlength="7" placeholder="Up to 7 chars" disabled />
      <div style="height:10px"></div>
      <button id="sendTextBtn" class="warn" disabled>Show Text</button>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════
       GAME PANEL (fullscreen overlay)
  ════════════════════════════════════════════════ -->
  <div id="gamePanel">
    <div class="gp-inner">

      <!-- Header -->
      <div class="gp-header">
        <div class="gp-title">🎮 Game Mode</div>
        <button id="closePanelBtn" title="Exit Game Mode">✕</button>
      </div>

      <!-- Game Selection -->
      <div id="gameSelectScreen">
        <div class="game-pick-label">Choose a game</div>

        <button class="game-card" data-game="GAME_SNAKE" data-name="🐍 Snake">
          <div class="gc-icon">🐍</div>
          <div class="gc-info">
            <div class="gc-name">Snake</div>
            <div class="gc-desc">Eat food, grow longer, avoid yourself</div>
          </div>
          <div class="gc-arrow">›</div>
        </button>

        <button class="game-card" data-game="GAME_SPACE" data-name="🚀 Space Shooter">
          <div class="gc-icon">🚀</div>
          <div class="gc-info">
            <div class="gc-name">Space Shooter</div>
            <div class="gc-desc">Blast falling enemies before they reach you</div>
          </div>
          <div class="gc-arrow">›</div>
        </button>

        <button class="game-card" data-game="GAME_FLAPPY" data-name="🐦 Flappy Bird">
          <div class="gc-icon">🐦</div>
          <div class="gc-info">
            <div class="gc-name">Flappy Bird</div>
            <div class="gc-desc">Tap to flap through the pipes</div>
          </div>
          <div class="gc-arrow">›</div>
        </button>
      </div>

      <!-- Game Controller -->
      <div id="gameControlScreen">
        <div class="gc-active-name" id="activeGameLabel">Snake</div>
        <div class="ctrl-hint">Tap buttons to control the robot's display</div>

        <div class="big-btns">
          <button class="big-btn" id="btnLeft">
            <span>◀</span>
            <span class="label">Left</span>
          </button>
          <button class="big-btn" id="btnRight">
            <span>▶</span>
            <span class="label">Right</span>
          </button>
        </div>

        <button class="back-from-ctrl" id="backToGamesBtn">← Back to game list</button>
      </div>

    </div>
  </div><!-- /gamePanel -->

  <script>
    const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
    const PASS_UUID    = 'abcd1234-1a2b-3c4d-5e6f-1234567890ab';
    const CMD_UUID     = 'dcba4321-4b3c-2d1e-f0e9-0987654321ff';
    const TEXT_UUID    = 'effe1234-4b3c-2d1e-f0e9-0987654321aa';

    const EXPRESSIONS = [
      ['SAD', 'Sadness'],
      ['ANGER', 'Anger'],
      ['HAPPY', 'Happiness'],
      ['PLEADING', 'Pleading'],
      ['VULNERABLE', 'Vulnerable'],
      ['DESPAIR', 'Despair'],
      ['SURPRISE', 'Surprise'],
      ['DISGUST', 'Disgust'],
      ['FEAR', 'Fear'],
      ['GUILTY', 'Guilty'],
      ['DISAPPOINTED', 'Disappointed'],
      ['EMBARRASSED', 'Embarrassed'],
      ['HORRIFIED', 'Horrified'],
      ['SKEPTICAL', 'Skeptical'],
      ['ANNOYED', 'Annoyed'],
      ['CONFUSED', 'Confused'],
      ['AMAZED', 'Amazed'],
      ['EXCITED', 'Excited'],
      ['FURIOUS', 'Furious'],
      ['SUSPICIOUS', 'Suspicious'],
      ['REJECTED', 'Rejected'],
      ['BORED', 'Bored'],
      ['TIRED', 'Tired'],
      ['ASLEEP', 'Asleep']
    ];

    let device = null, server = null, service = null;
    let passChar = null, cmdChar = null, textChar = null;
    let activeMode = 'auto';
    let activeExpression = '';
    let textShown = false;
    let inGameMode = false;

    const $ = id => document.getElementById(id);
    const expressionButtons = new Map();

    // ── Connection State ──────────────────────────────────
    function setConnectionState(connected) {
      const badge = $('connBadge');
      badge.textContent = connected ? 'Connected' : 'Disconnected';
      badge.classList.toggle('connected', connected);
      badge.classList.toggle('disconnected', !connected);
    }

    function setButtons(enabled) {
      $('disconnectBtn').disabled = !enabled;
      $('autoBtn').disabled       = !enabled;
      $('manualBtn').disabled     = !enabled;
      $('gameModeBtn').disabled   = !enabled;
      $('sendTextBtn').disabled   = !enabled;
      $('password').disabled      = !enabled;
      $('customText').disabled    = !enabled;
      document.querySelectorAll('#expressionGrid button')
        .forEach(btn => btn.disabled = !enabled);
    }

    function updateTextButton() {
      const btn = $('sendTextBtn');
      btn.textContent = textShown ? 'Remove Text' : 'Show Text';
      btn.classList.toggle('active', textShown);
      btn.classList.toggle('text', textShown);
    }

    function renderActiveState() {
      $('autoBtn').classList.toggle('active', activeMode === 'auto');
      $('autoBtn').classList.toggle('mode-auto', activeMode === 'auto');
      $('manualBtn').classList.toggle('active', activeMode === 'manual');
      $('manualBtn').classList.toggle('mode-manual', activeMode === 'manual');

      for (const [cmd, btn] of expressionButtons.entries()) {
        const on = activeExpression === cmd;
        btn.classList.toggle('active', on);
        btn.classList.toggle('expr', on);
      }
      updateTextButton();
    }

    // ── BLE Write ─────────────────────────────────────────
    async function writeText(characteristic, text) {
      const data = new TextEncoder().encode(text);
      try {
        if (characteristic.writeValueWithoutResponse) {
          await characteristic.writeValueWithoutResponse(data);
          return;
        }
      } catch (e) {}
      await characteristic.writeValue(data);
    }

    async function clearTextMode() {
      if (!textShown || !textChar) return;
      try { await writeText(textChar, 'CLEAR'); } catch (err) { console.error(err); }
      textShown = false;
      updateTextButton();
    }

    async function sendCommand(cmd) {
      if (!cmdChar) return;
      try {
        await clearTextMode();
        await writeText(cmdChar, cmd);

        if (cmd === 'AUTO') {
          activeMode = 'auto'; activeExpression = '';
        } else if (cmd === 'MANUAL') {
          activeMode = 'manual'; activeExpression = '';
        } else {
          activeMode = 'manual'; activeExpression = cmd;
        }
        renderActiveState();
      } catch (err) { console.error(err); }
    }

    async function sendCustomText() {
      if (!textChar) return;
      const value = $('customText').value.trim();
      if (textShown) { await clearTextMode(); return; }
      if (value.length < 1 || value.length > 7) return;
      try {
        await writeText(textChar, value);
        textShown = true;
        activeMode = 'manual'; activeExpression = '';
        renderActiveState();
      } catch (err) { console.error(err); }
    }

    // ── BLE Connect ───────────────────────────────────────
    async function connect() {
      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [{ services: [SERVICE_UUID] }],
          optionalServices: [SERVICE_UUID]
        });
        device.addEventListener('gattserverdisconnected', onDisconnected);

        server    = await device.gatt.connect();
        service   = await server.getPrimaryService(SERVICE_UUID);
        passChar  = await service.getCharacteristic(PASS_UUID);
        cmdChar   = await service.getCharacteristic(CMD_UUID);
        textChar  = await service.getCharacteristic(TEXT_UUID);

        const pass = $('password').value.trim() || 'nexrobo';
        await writeText(passChar, pass);

        setButtons(true);
        setConnectionState(true);
        activeMode = 'auto'; activeExpression = '';
        textShown = false;
        renderActiveState();
        await sendCommand('AUTO');
      } catch (err) {
        console.error(err);
        setButtons(false);
        setConnectionState(false);
      }
    }

    function onDisconnected() {
      setButtons(false);
      setConnectionState(false);
      activeMode = 'auto'; activeExpression = '';
      textShown = false;
      inGameMode = false;
      closeGamePanel(false); // close without sending BLE (already disconnected)
      renderActiveState();
    }

    function disconnect() {
      if (device && device.gatt.connected) device.gatt.disconnect();
    }

    // ── GAME PANEL ────────────────────────────────────────
    let currentGameCmd  = '';
    let currentGameName = '';

    function openGamePanel() {
      if (showingText) return; // respect: text mode blocks game start
      $('gamePanel').classList.add('open');
      showSelectScreen();
      inGameMode = true;
    }

    async function closeGamePanel(sendExit = true) {
      $('gamePanel').classList.remove('open');
      showSelectScreen();
      inGameMode = false;
      if (sendExit && cmdChar) {
        try { await writeText(cmdChar, 'GAME_EXIT'); } catch (e) {}
      }
      // Restore normal state
      activeMode = 'auto'; activeExpression = '';
      renderActiveState();
    }

    function showSelectScreen() {
      $('gameSelectScreen').style.display   = 'flex';
      $('gameControlScreen').style.display  = 'none';
      currentGameCmd  = '';
      currentGameName = '';
    }

    async function selectGame(cmd, name) {
      currentGameCmd  = cmd;
      currentGameName = name;
      $('activeGameLabel').textContent = name;
      $('gameSelectScreen').style.display  = 'none';
      $('gameControlScreen').style.display = 'flex';

      // Send BLE game command
      if (cmdChar) {
        try { await writeText(cmdChar, cmd); } catch (e) { console.error(e); }
      }
    }

    async function backToGameList() {
      // Exit current game, go back to selection (stay in game panel)
      if (cmdChar) {
        try { await writeText(cmdChar, 'GAME_EXIT'); } catch (e) {}
      }
      showSelectScreen();
    }

    // ── Control buttons — fast, reliable ─────────────────
    function setupControlButton(btn, cmd) {
      let interval = null;

      async function fire() {
        if (!cmdChar) return;
        try { await writeText(cmdChar, cmd); } catch (e) {}
      }

      // Touch events for mobile (most important)
      btn.addEventListener('touchstart', e => {
        e.preventDefault();
        fire();
        interval = setInterval(fire, 80);
      }, { passive: false });

      btn.addEventListener('touchend', e => {
        e.preventDefault();
        clearInterval(interval);
        interval = null;
      }, { passive: false });

      // Mouse events for desktop
      btn.addEventListener('mousedown', () => {
        fire();
        interval = setInterval(fire, 80);
      });

      btn.addEventListener('mouseup', () => {
        clearInterval(interval);
        interval = null;
      });

      btn.addEventListener('mouseleave', () => {
        clearInterval(interval);
        interval = null;
      });
    }

    // ── Wire everything up ────────────────────────────────
    $('connectBtn').addEventListener('click', connect);
    $('disconnectBtn').addEventListener('click', disconnect);
    $('autoBtn').addEventListener('click', () => sendCommand('AUTO'));
    $('manualBtn').addEventListener('click', () => sendCommand('MANUAL'));
    $('sendTextBtn').addEventListener('click', sendCustomText);
    $('customText').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendCustomText();
    });

    // Game mode button
    $('gameModeBtn').addEventListener('click', openGamePanel);

    // Close panel button
    $('closePanelBtn').addEventListener('click', () => closeGamePanel(true));

    // Game cards
    document.querySelectorAll('.game-card').forEach(card => {
      card.addEventListener('click', () => {
        selectGame(card.dataset.game, card.dataset.name);
      });
    });

    // Back button in controller
    $('backToGamesBtn').addEventListener('click', backToGameList);

    // Control buttons
    setupControlButton($('btnLeft'),  'BTN_LEFT');
    setupControlButton($('btnRight'), 'BTN_RIGHT');

    // Expression buttons
    const grid = $('expressionGrid');
    EXPRESSIONS.forEach(([cmd, label]) => {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.disabled = true;
      btn.addEventListener('click', async () => {
        // Exit game if active
        if (inGameMode) await closeGamePanel(true);
        await sendCommand(cmd);
      });
      expressionButtons.set(cmd, btn);
      grid.appendChild(btn);
    });

    // Init
    let showingText = false; // local mirror for text guard
    setButtons(false);
    setConnectionState(false);
    renderActiveState();
  </script>
</body>
</html>
